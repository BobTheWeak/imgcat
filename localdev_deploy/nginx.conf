worker_processes 1;
thread_pool default threads=4;

events {
}
http {
	upstream frontend {
		server host.docker.internal:9720;
		server icfe:8080 backup;
	}

	server {
		listen 80;
		server_name localhost;
		error_log /var/log/nginx/error.log info;

		proxy_buffering off;
		client_body_buffer_size 10m;
		client_max_body_size 100m;

		### Backend Services ###
		
		### Frontend Services ###
		# Image Proxy
		location /api/img/ {
			proxy_http_version 1.1;
			proxy_set_header Access-Control-Allow-Origin *;
			proxy_pass http://i.imgcat.io/;
		}

		### Microservices ###
		# Auth Microservice
		location /api/auth/ {
			proxy_http_version 1.1;
			proxy_set_header Access-Control-Allow-Origin *;
			proxy_pass http://auth:8080/;
		}
		# Softmod Actions Microservice
		location /api/smact/ {
			proxy_http_version 1.1;
			proxy_set_header Access-Control-Allow-Origin *;
			proxy_pass http://smact:8080/;
		}
		# Posts Microservice
		location /api/posts/ {
			proxy_http_version 1.1;
			proxy_set_header Access-Control-Allow-Origin *;
			proxy_pass http://posts-svc:8080/;
		}
		# Users Microservice
		location /api/users/ {
			proxy_http_version 1.1;
			proxy_set_header Access-Control-Allow-Origin *;
			proxy_pass http://users-svc:8080/;
		}

		# Fall-through... if we haven't found a match yet, try svelte...

		# Frontend (Node.js/Svelte)
		location / {
			proxy_pass http://frontend/;
		}
	}
}

stream {
	server {
		listen 8081;
		proxy_pass localdev-mariadb:8080;
	}

	server {
		listen 8082;
		proxy_pass localdev-redis:8080;
		# proxy_connect_timeout 1s;
		# proxy_timeout 3s;
	}

	server {
		listen 8083;
		proxy_pass localdev-postgres:8080;
	}
}